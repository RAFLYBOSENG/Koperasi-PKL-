<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Koperasi BLK Bandung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <style>
        .brand-logo {
            width: 68px;
            height: 68px;
            object-fit: contain;
        }
    </style>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo/Koperasi BLK Bandung.png') }}" alt="Logo Koperasi BLK Bandung" class="brand-logo mb-2">
                    <h3 class="mt-3 mb-1 fw-bold">Koperasi BLK Bandung</h3>
                    <p class="text-muted mb-0">Silakan login untuk melanjutkan</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form method="POST" action="{{ url_for('public_portal.login') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <input type="hidden" name="next" value="{{ next or '' }}">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" name="username" class="form-control" required autofocus placeholder="">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" name="password" class="form-control" required placeholder="">
                                </div>
                            </div>
                            <button class="btn btn-primary w-100" type="submit">
                                <i class="fas fa-right-to-bracket me-1"></i>Login
                            </button>
                        </form>

                        <div class="d-flex justify-content-between align-items-center mt-3 small">
                            <a href="{{ url_for('public_portal.lupa_password') }}">Lupa password?</a>
                            <a href="{{ url_for('public_portal.landing') }}" class="text-muted">← Beranda</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
