{% extends "base.html" %}
{% block title %}Edit Anggota - Koperasi BLK Bandung{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-pen me-2"></i>Edit Data Anggota</h5>
                <span class="badge bg-dark">{{ anggota['no_anggota'] }}</span>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_anggota', id_anggota=anggota['id_anggota']) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label class="form-label">NIK</label>
                        <input type="text" name="nik" class="form-control" value="{{ anggota.get('nik', '') }}" placeholder="16 digit NIK"
                               inputmode="numeric" maxlength="16" pattern="\d{16}"
                               oninput="this.value=this.value.replace(/\D/g,'').slice(0,16)">
                        <div class="form-text">Isi 16 digit angka.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" name="nama_lengkap" class="form-control" required value="{{ anggota['nama_lengkap'] }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Alamat</label>
                        <textarea name="alamat" class="form-control" rows="2" required>{{ anggota['alamat'] }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">No. Telepon</label>
                        <input type="tel" name="no_hp" class="form-control" value="{{ anggota.get('no_hp', '') }}" placeholder="Cth: 0812345678"
                               inputmode="tel">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">No. Rekening</label>
                        <input type="text" name="no_rekening" class="form-control" value="{{ anggota.get('no_rekening', '') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Bank</label>
                        <input type="text" name="nama_bank" class="form-control" value="{{ anggota.get('nama_bank', '') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Penghasilan Bersih / Bulan (Rp)</label>
                        <input type="text" name="penghasilan_bersih" class="form-control" required
                               placeholder="Contoh: 5000000" value="{{ anggota.get('penghasilan_bersih', '0') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cicilan Lain / Bulan (Rp)</label>
                        <input type="text" name="cicilan_lain" class="form-control" placeholder="0"
                               value="{{ anggota.get('cicilan_lain', '0') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Catatan Kredit</label>
                        <textarea class="form-control" rows="3" readonly>{{ anggota.get('catatan_kredit', '-') or '-' }}</textarea>
                        <div class="form-text">Diisi otomatis dari jadwal cicilan dan keterlambatan pembayaran.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('halaman_anggota') }}" class="btn btn-outline-secondary">Batal</a>
                        <button type="submit" class="btn btn-warning text-dark flex-grow-1">
                            <i class="fas fa-save me-1"></i>Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
